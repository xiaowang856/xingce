<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>公考复习小程序</title>
    <link rel="stylesheet" href="styles.css?v=20260618-bg-v3" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">考</div>
        <div>
          <h1>公考复习</h1>
          <p>行测 · 申论 · 成语</p>
        </div>
      </div>
      <nav class="nav" aria-label="主导航">
        <button class="nav-btn active" data-view="dashboard">总览</button>
        <button class="nav-btn" data-view="daily">每日打卡</button>
        <button class="nav-btn" data-view="mistakes">行测错题</button>
        <button class="nav-btn" data-view="shenlun">申论练习</button>
        <button class="nav-btn" data-view="idioms">成语积累</button>
        <button class="nav-btn" data-view="resources">网站资源</button>
        <button class="nav-btn" data-view="profile">个人设置</button>
      </nav>
      <div class="sidebar-note">
        <strong>本地保存</strong>
        <span>新增记录会保存在当前浏览器。</span>
      </div>
    </aside>

    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Civil Service Study</p>
          <h2 id="viewTitle">总览</h2>
        </div>
        <button id="topAvatarBtn" class="top-avatar" type="button" aria-label="打开个人设置">考</button>
      </header>

      <section id="dashboard" class="view active">
        <div class="metric-grid">
          <article class="metric metric-link" data-target-view="idioms" tabindex="0" role="button" aria-label="打开成语积累">
            <span>成语总数</span>
            <strong id="idiomCount">0</strong>
          </article>
          <article class="metric metric-link" data-target-view="daily" tabindex="0" role="button" aria-label="打开每日打卡">
            <span>今日打卡</span>
            <strong id="todayStatus">未记录</strong>
          </article>
          <article class="metric metric-link" data-target-view="mistakes" tabindex="0" role="button" aria-label="打开行测错题">
            <span>错题记录</span>
            <strong id="mistakeCount">0</strong>
          </article>
          <article class="metric metric-link" data-target-view="shenlun" tabindex="0" role="button" aria-label="打开申论练习">
            <span>申论练习</span>
            <strong id="shenlunCount">0</strong>
          </article>
        </div>
        <div class="panel-grid">
          <section class="panel">
            <div class="panel-head">
              <h3>复习重点</h3>
            </div>
            <div id="focusList" class="focus-list"></div>
          </section>
          <section class="panel">
            <div class="panel-head">
              <h3>周计划</h3>
            </div>
            <div id="weeklyPlan" class="week-list"></div>
          </section>
        </div>
      </section>

      <section id="daily" class="view">
        <section class="panel">
          <div class="panel-head">
            <h3>新增每日打卡</h3>
          </div>
          <form id="dailyForm" class="form-grid">
            <label>日期<input name="date" type="date" required /></label>
            <label>学习时长<input name="minutes" type="number" min="0" placeholder="分钟" /></label>
            <label>行测模块
              <select name="module">
                <optgroup label="言语理解">
                  <option>言语理解</option>
                  <option>逻辑填空</option>
                  <option>片段阅读</option>
                  <option>语句表达</option>
                  <option>篇章阅读</option>
                </optgroup>
                <optgroup label="判断推理">
                  <option>判断推理</option>
                  <option>图形推理</option>
                  <option>定义判断</option>
                  <option>类比推理</option>
                  <option>逻辑判断</option>
                </optgroup>
                <optgroup label="资料分析">
                  <option>资料分析</option>
                  <option>增长率</option>
                  <option>比重</option>
                  <option>倍数与平均数</option>
                  <option>综合资料分析</option>
                </optgroup>
                <optgroup label="数量关系">
                  <option>数量关系</option>
                  <option>工程问题</option>
                  <option>行程问题</option>
                  <option>经济利润</option>
                  <option>排列组合与概率</option>
                  <option>几何问题</option>
                  <option>最值问题</option>
                </optgroup>
                <optgroup label="常识判断">
                  <option>常识判断</option>
                  <option>政治常识</option>
                  <option>法律常识</option>
                  <option>经济常识</option>
                  <option>科技常识</option>
                  <option>人文历史</option>
                  <option>地理国情</option>
                </optgroup>
                <optgroup label="综合训练">
                  <option>套卷训练</option>
                  <option>混合训练</option>
                </optgroup>
              </select>
            </label>
            <label>题量<input name="total" type="number" min="0" /></label>
            <label>正确数<input name="correct" type="number" min="0" /></label>
            <label>申论任务<input name="shenlunTask" type="text" placeholder="如：归纳概括1题" /></label>
            <label class="wide">今日问题<input name="problem" type="text" placeholder="错因、拖慢速度的点" /></label>
            <label class="wide">明日调整<input name="adjust" type="text" placeholder="明天怎么改" /></label>
            <button class="primary-btn" type="submit">保存打卡</button>
          </form>
        </section>
        <section class="panel">
          <div class="panel-head">
            <h3>打卡记录</h3>
            <input id="dailySearch" class="search" placeholder="搜索模块/问题" />
          </div>
          <div id="dailyTable" class="table-wrap"></div>
        </section>
      </section>

      <section id="mistakes" class="view">
        <section class="panel">
          <div class="panel-head"><h3>新增行测错题</h3></div>
          <form id="mistakeForm" class="form-grid">
            <label>日期<input name="date" type="date" required /></label>
            <label>模块
              <select name="module">
                <option>言语理解</option>
                <option>数量关系</option>
                <option>判断推理</option>
                <option>资料分析</option>
                <option>常识判断</option>
              </select>
            </label>
            <label>题型
              <select name="type">
                <option>逻辑填空</option>
                <option>片段阅读</option>
                <option>语句表达</option>
                <option>篇章阅读</option>
                <option>图形推理</option>
                <option>定义判断</option>
                <option>类比推理</option>
                <option>逻辑判断</option>
                <option>资料分析</option>
                <option>数量关系</option>
                <option>常识判断</option>
                <option>套卷错题</option>
                <option>其他</option>
              </select>
            </label>
            <label>错因
              <select name="reason">
                <option>不会</option>
                <option>粗心</option>
                <option>读错题</option>
                <option>时间不够</option>
                <option>方法不熟</option>
                <option>计算错误</option>
              </select>
            </label>
            <label class="wide">正确方法/公式<input name="method" type="text" /></label>
            <label class="wide">题源链接<input name="source" type="text" /></label>
            <button id="mistakeSubmitBtn" class="primary-btn" type="submit">保存错题</button>
            <button id="cancelMistakeEditBtn" class="ghost-btn" type="button" hidden>取消编辑</button>
          </form>
        </section>
        <section class="panel">
          <div class="panel-head">
            <h3>错题列表</h3>
            <input id="mistakeSearch" class="search" placeholder="搜索模块/错因/方法" />
          </div>
          <div id="mistakeTable" class="table-wrap"></div>
        </section>
      </section>

      <section id="shenlun" class="view">
        <section class="panel">
          <div class="panel-head"><h3>新增申论练习</h3></div>
          <form id="shenlunForm" class="form-grid">
            <label>日期<input name="date" type="date" required /></label>
            <label>题型
              <select name="type">
                <option>归纳概括</option>
                <option>提出对策</option>
                <option>综合分析</option>
                <option>贯彻执行</option>
                <option>公文题</option>
                <option>大作文</option>
                <option>整套真题</option>
              </select>
            </label>
            <label>材料主题<input name="topic" type="text" /></label>
            <label>自评分<input name="score" type="number" min="0" max="100" /></label>
            <label class="wide">主要漏点<input name="miss" type="text" /></label>
            <label class="wide">修改后要点<input name="rewrite" type="text" /></label>
            <label class="wide">参考链接<input name="link" type="text" /></label>
            <button class="primary-btn" type="submit">保存申论记录</button>
          </form>
        </section>
        <section class="panel">
          <div class="panel-head">
            <h3>申论记录</h3>
            <input id="shenlunSearch" class="search" placeholder="搜索题型/主题/漏点" />
          </div>
          <div id="shenlunTable" class="table-wrap"></div>
        </section>
      </section>

      <section id="idioms" class="view">
        <section class="panel">
          <div class="panel-head">
            <h3>成语查询</h3>
            <div class="filters idiom-lookup">
              <input id="idiomLookupInput" class="search lookup-input" placeholder="输入成语查询" />
              <button id="queryIdiomApiBtn" class="primary-btn compact-btn" type="button">查询</button>
            </div>
          </div>
          <div class="filters filter-row">
            <input id="idiomSearch" class="search" placeholder="筛选成语/含义/易错点" />
            <select id="idiomTone">
              <option value="">全部色彩</option>
              <option>褒义</option>
              <option>贬义</option>
              <option>中性</option>
            </select>
            <select id="idiomStatus">
              <option value="">全部状态</option>
              <option>未掌握</option>
              <option>需复习</option>
              <option>已掌握</option>
            </select>
            <button id="refreshIdiomsBtn" class="ghost-btn" type="button">刷新</button>
          </div>
          <div id="idiomApiResult" class="idiom-api-result"></div>
          <div id="idiomCards" class="idiom-grid"></div>
        </section>
      </section>

      <section id="resources" class="view">
        <div class="panel-grid">
          <section class="panel">
            <div class="panel-head"><h3>申论素材网站</h3></div>
            <div id="shenlunSites" class="resource-list"></div>
          </section>
          <section class="panel">
            <div class="panel-head"><h3>行测练习网站</h3></div>
            <div id="xingceSites" class="resource-list"></div>
          </section>
        </div>
      </section>

      <section id="profile" class="view">
        <section class="panel">
          <div class="panel-head">
            <h3>个人设置</h3>
          </div>
          <div class="profile-layout">
            <div class="avatar-editor">
              <div id="avatarPreview" class="avatar-preview">考</div>
              <div class="avatar-actions">
                <button id="avatarUploadBtn" class="ghost-btn" type="button">上传头像</button>
                <button id="avatarRemoveBtn" class="ghost-btn danger" type="button">移除头像</button>
                <input id="avatarInput" class="file-input" type="file" accept="image/*" />
              </div>
            </div>
            <form class="settings-grid">
              <label>使用者<input id="userIdInput" type="text" autocomplete="username" /></label>
              <label>同步密码<input id="syncPasswordInput" type="password" autocomplete="current-password" /></label>
              <button id="loadCloudBtn" class="ghost-btn" type="button">读取云端</button>
              <button id="saveCloudBtn" class="ghost-btn" type="button">保存云端</button>
              <button id="exportJsonBtn" class="ghost-btn" type="button">导出我的数据</button>
              <button id="importJsonBtn" class="ghost-btn" type="button">导入数据</button>
              <input id="importJsonInput" class="file-input" type="file" accept="application/json,.json" />
              <button id="resetBtn" class="ghost-btn danger" type="button">清空本地记录</button>
            </form>
          </div>
        </section>
      </section>
    </main>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="data.js?v=20260622-pdf-idioms"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js?v=20260623-sync-error"></script>
  </body>
</html>
